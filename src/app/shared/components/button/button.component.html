<!-- External Link (href) -->
<a
  *ngIf="isExternalLink"
  [attr.href]="isDisabled ? null : href"
  [target]="target"
  [rel]="rel || (target === '_blank' ? 'noopener noreferrer' : undefined)"
  [class]="buttonClasses"
  [attr.aria-label]="ariaLabel"
  [attr.aria-busy]="loading"
  [attr.aria-disabled]="isDisabled"
  [attr.tabindex]="isDisabled ? -1 : null"
  [class.pointer-events-none]="isDisabled"
  (click)="onClick($event)"
>
  <span *ngIf="loading" class="animate-spin" aria-hidden="true">
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
  </span>

  <span *ngIf="iconLeft && !loading" [innerHTML]="iconLeft" aria-hidden="true"></span>

  <span [class.opacity-0]="loading && !showContentWhileLoading">
    <ng-content></ng-content>
  </span>

  <span *ngIf="iconRight && !loading" [innerHTML]="iconRight" aria-hidden="true"></span>
</a>

<!-- Router Link -->
<a
  *ngIf="isRouterLink"
  [routerLink]="isDisabled ? null : routerLink"
  [class]="buttonClasses"
  [attr.aria-label]="ariaLabel"
  [attr.aria-busy]="loading"
  [attr.aria-disabled]="isDisabled"
  [attr.tabindex]="isDisabled ? -1 : null"
  [class.pointer-events-none]="isDisabled"
  (click)="onClick($event)"
>
  <span *ngIf="loading" class="animate-spin" aria-hidden="true">
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
  </span>

  <span *ngIf="iconLeft && !loading" [innerHTML]="iconLeft" aria-hidden="true"></span>

  <span [class.opacity-0]="loading && !showContentWhileLoading">
    <ng-content></ng-content>
  </span>

  <span *ngIf="iconRight && !loading" [innerHTML]="iconRight" aria-hidden="true"></span>
</a>

<!-- Button -->
<button
  *ngIf="!isExternalLink && !isRouterLink"
  [type]="type"
  [disabled]="isDisabled"
  [class]="buttonClasses"
  [attr.aria-label]="ariaLabel"
  [attr.aria-busy]="loading"
  (click)="onClick($event)"
>
  <span *ngIf="loading" class="animate-spin" aria-hidden="true">
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
  </span>

  <span *ngIf="iconLeft && !loading" [innerHTML]="iconLeft" aria-hidden="true"></span>

  <span [class.opacity-0]="loading && !showContentWhileLoading">
    <ng-content></ng-content>
  </span>

  <span *ngIf="iconRight && !loading" [innerHTML]="iconRight" aria-hidden="true"></span>
</button>
