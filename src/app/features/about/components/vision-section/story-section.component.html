<section class="story-section">

  <!-- Subtitle + Main text row -->
  <div class="split-grid u-grid-desktop story-section__intro">
    <div class="split-col u-column-6">
      <div class="body-upper">
        <p>{{ 'about.storySection.subtitle' | transloco }}</p>
      </div>
    </div>

    <div class="split-col u-column-6">
      <div class="u-text-style-h2">
        <p class="p-contents">
          {{ 'about.storySection.mainText' | transloco }}
        </p>
      </div>
    </div>
  </div>

  <!-- Balanced story copy row -->
  <div class="split-grid u-grid-desktop story-section__body">
    <div class="split-col u-column-6"></div>

    <div class="split-col u-column-6">
      <div class="story-copy u-text-style-small f-5 balanced-text-columns">
        <p>
          {{ 'about.storySection.paragraph' | transloco }}
        </p>
      </div>
    </div>
  </div>

</section>
